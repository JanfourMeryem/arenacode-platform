# Unified Nginx gateway (step 1)
# - /              -> main-frontend
# - /challenges/   -> frontend
# - /playground/   -> playground/client
# - /api + /ws     -> playground/server

upstream node_backend {
    server app:3000;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json text/css application/javascript text/javascript;
    gzip_min_length 256;
    gzip_vary on;

    # API reverse proxy (unchanged)
    location /api/ {
        proxy_pass http://node_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket upgrade (unchanged)
    location /ws {
        proxy_pass http://node_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Normalize section URLs
    location = /challenges {
        return 301 $scheme://$http_host/challenges/;
    }

    location = /playground {
        return 301 $scheme://$http_host/playground/;
    }

    # Challenges app
    location /challenges/ {
        alias /usr/share/nginx/frontend/;
        index index.html;
        try_files $uri $uri/ /challenges/index.html;
    }

    # Playground app
    location /playground/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /playground/index.html;
    }

    # Main frontend landing page
    location / {
        root /usr/share/nginx/main-frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
